name: AWS Deploy

on:
  workflow_dispatch:
    inputs:
      apply_terraform:
        description: "Run terraform apply after plan"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      image_tag:
        description: "Docker image tag (use 'latest' to deploy this commit SHA)"
        required: false
        default: "latest"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-north-1' }}
      IMAGE_TAG: ${{ (github.event.inputs.image_tag == 'latest' || github.event.inputs.image_tag == '') && github.sha || github.event.inputs.image_tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Verify AWS secrets are configured
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ] || [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "::error::Missing GitHub secrets AWS_ACCESS_KEY_ID and/or AWS_SECRET_ACCESS_KEY."
            echo "Add them at: Settings → Secrets and variables → Actions → Repository secrets"
            echo "Use the same IAM access key as your local mip-dev profile (IAM → Users → Security credentials → Create access key)."
            exit 1
          fi
          missing=""
          if [ -z "${{ secrets.TF_VAR_db_username }}" ] && [ -z "${{ secrets.TF_VAR_DB_USERNAME }}" ]; then missing="$missing TF_VAR_db_username"; fi
          if [ -z "${{ secrets.TF_VAR_db_password }}" ] && [ -z "${{ secrets.TF_VAR_DB_PASSWORD }}" ]; then missing="$missing TF_VAR_db_password"; fi
          if [ -z "${{ secrets.TF_VAR_mip_bucket_name }}" ] && [ -z "${{ secrets.TF_VAR_MIP_BUCKET_NAME }}" ]; then missing="$missing TF_VAR_mip_bucket_name"; fi
          if [ -z "${{ secrets.TF_VAR_jwt_signing_key }}" ] && [ -z "${{ secrets.TF_VAR_JWT_SIGNING_KEY }}" ]; then missing="$missing TF_VAR_jwt_signing_key"; fi
          if [ -z "${{ secrets.TF_VAR_identity_default_admin_password }}" ] && [ -z "${{ secrets.TF_VAR_IDENTITY_DEFAULT_ADMIN_PASSWORD }}" ]; then missing="$missing TF_VAR_identity_default_admin_password"; fi
          if [ -n "$missing" ]; then
            echo "::error::Missing GitHub Actions secrets:$missing"
            echo "Add them under Settings → Secrets and variables → Actions → Repository secrets."
            echo "TF_VAR_identity_default_admin_password must match identity_default_admin_password in infra/terraform/terraform.tfvars."
            exit 1
          fi
          echo "AWS and Terraform secrets present."

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2.1.6

      - name: Build and push API image
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          ECR_REPOSITORY: mip-aws-dev-api
        run: |
          docker build -f Dockerfile.Api \
            --build-arg SOURCE_REVISION=${{ github.sha }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.IMAGE_TAG }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.IMAGE_TAG }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Build and push Worker image
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          ECR_REPOSITORY: mip-aws-dev-worker
        run: |
          docker build -f Dockerfile.Worker \
            --build-arg SOURCE_REVISION=${{ github.sha }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.IMAGE_TAG }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.IMAGE_TAG }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - uses: hashicorp/setup-terraform@v4
        if: github.event.inputs.apply_terraform == 'true'

      - name: Terraform Init
        if: github.event.inputs.apply_terraform == 'true'
        working-directory: infra/terraform
        env:
          TF_BACKEND_BUCKET: ${{ secrets.TF_VAR_mip_bucket_name || secrets.TF_VAR_MIP_BUCKET_NAME }}
        run: |
          terraform init \
            -backend-config="bucket=${TF_BACKEND_BUCKET}" \
            -backend-config="key=mip/terraform/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform Plan
        if: github.event.inputs.apply_terraform == 'true'
        working-directory: infra/terraform
        env:
          TF_INPUT: "0"
          TF_VAR_db_username: ${{ secrets.TF_VAR_db_username || secrets.TF_VAR_DB_USERNAME }}
          TF_VAR_db_password: ${{ secrets.TF_VAR_db_password || secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_mip_bucket_name: ${{ secrets.TF_VAR_mip_bucket_name || secrets.TF_VAR_MIP_BUCKET_NAME }}
          TF_VAR_ses_sender_email: ${{ secrets.TF_VAR_ses_sender_email || secrets.TF_VAR_SES_SENDER_EMAIL }}
          TF_VAR_jwt_signing_key: ${{ secrets.TF_VAR_jwt_signing_key || secrets.TF_VAR_JWT_SIGNING_KEY }}
          TF_VAR_identity_default_admin_password: ${{ secrets.TF_VAR_identity_default_admin_password || secrets.TF_VAR_IDENTITY_DEFAULT_ADMIN_PASSWORD }}
          TF_VAR_api_image_tag: ${{ env.IMAGE_TAG }}
          TF_VAR_worker_image_tag: ${{ env.IMAGE_TAG }}
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_bedrock_region: ${{ vars.BEDROCK_REGION || env.AWS_REGION }}
          TF_VAR_bedrock_model_id: ${{ vars.BEDROCK_MODEL_ID }}
        run: terraform plan -var-file=terraform.aws-dev.tfvars -out=tfplan

      - name: Terraform Apply
        if: github.event.inputs.apply_terraform == 'true'
        working-directory: infra/terraform
        run: terraform apply -auto-approve tfplan

      - name: Force ECS API service redeploy
        run: |
          aws ecs update-service --cluster mip-aws-dev-cluster --service mip-aws-dev-api --force-new-deployment --region $AWS_REGION
          aws ecs update-service --cluster mip-aws-dev-cluster --service mip-aws-dev-worker --force-new-deployment --region $AWS_REGION || true
