name: AWS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore MIP.Aws.slnx

      - name: Build
        run: dotnet build MIP.Aws.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test MIP.Aws.slnx --configuration Release --no-build --verbosity normal

      - name: Publish API artifact
        run: dotnet publish src/MIP.Aws.Api/MIP.Aws.Api.csproj -c Release -o ./artifacts/api

      - name: Publish Worker artifact
        run: dotnet publish src/MIP.Aws.Worker/MIP.Aws.Worker.csproj -c Release -o ./artifacts/worker

      - uses: actions/upload-artifact@v4
        with:
          name: mip-aws-publish
          path: artifacts/
          retention-days: 7

  validate-terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate
